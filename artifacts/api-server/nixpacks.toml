[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = ["PUPPETEER_SKIP_DOWNLOAD=true pnpm install"]

[phases.build]
cmds = ["pnpm run typecheck:libs && pnpm --filter @workspace/aurelion run build && pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm run start"
